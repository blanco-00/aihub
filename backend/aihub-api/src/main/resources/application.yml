spring:
  profiles:
    active: dev  # 默认使用 dev profile（开发环境通用配置）
    # 如果需要个性化配置，可以激活 local profile：active: local,dev
    # application-local.yml 会覆盖 application-dev.yml 中的配置
  application:
    name: aihub-api
  
  # 配置文件加载顺序：
  # application.yml -> application-dev.yml (dev profile) -> application-local.yml (local profile, 如果存在)
  # application-local.yml 会覆盖 application-dev.yml 中的配置
  # 也可以通过环境变量覆盖：DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aihub}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      # 性能优化：连接池配置
      minimum-idle: 5      # 最小空闲连接数（预热连接池，避免首次连接慢）
      maximum-pool-size: 20  # 最大连接数
      connection-timeout: 5000  # 连接超时时间（5秒，快速失败）
      idle-timeout: 600000  # 空闲连接超时（10分钟）
      max-lifetime: 1800000  # 连接最大生命周期（30分钟）
      leak-detection-threshold: 60000  # 连接泄漏检测阈值（60秒）
      # 启动时立即初始化连接池（不延迟加载）
      initialization-fail-timeout: 0  # 0 表示立即初始化，失败时立即报错
      connection-test-query: SELECT 1  # 连接测试查询
  
  # Redis 配置（默认配置，可在 profile 中覆盖）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  # Flyway 配置（可选，仅开发环境启用）
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1.0.0

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aihub.entity
  configuration:
    map-underscore-to-camel-case: true
    # 性能优化：关闭 SQL 日志输出到控制台，改为使用 SLF4J 日志（可通过 logging.level 控制）
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
    # 性能优化：在应用启动时立即初始化 DispatcherServlet，而不是懒加载
    # 这样可以避免首次请求时的初始化延迟（约1-2秒）
    eager-init: true
  tomcat:
    # 性能优化：Tomcat 连接器配置
    threads:
      max: 200  # 最大线程数
      min-spare: 10  # 最小空闲线程数（预热线程池）
    accept-count: 100  # 等待队列长度
    max-connections: 10000  # 最大连接数
    connection-timeout: 20000  # 连接超时时间（20秒）
    # 性能优化：启用压缩，减少传输时间
    compression: on
    compressible-mime-types: application/json,application/xml,text/html,text/xml,text/plain

# JWT配置
jwt:
  secret: aihub-secret-key-change-in-production-environment-minimum-32-characters
  expiration: 86400000  # Token过期时间：24小时（毫秒）
  refresh-expiration: 604800000  # 刷新Token过期时间：7天（毫秒）

# 验证码配置
verification:
  code:
    expiration: 300000  # 验证码过期时间：5分钟（毫秒）
    length: 6  # 验证码长度
    dev-mode: true  # 开发模式：打印验证码到日志（生产环境应设置为false）

# 部门配置
department:
  max-level: 5  # 部门最大层级深度（推荐5层，满足99%的企业需求）

# 日志配置
# 日志等级说明：
#   TRACE: 最详细（通常关闭）
#   DEBUG: 调试信息（开发环境开启，生产环境关闭）
#   INFO:  重要业务信息（开发和生产都开启）
#   WARN:  警告信息（开发和生产都开启）
#   ERROR: 错误信息（开发和生产都开启）
logging:
  level:
    # 项目代码：info（生产环境），如需调试可改为 debug
    com.aihub: info
    
    # 菜单服务：debug（用于调试菜单查询问题）
    com.aihub.admin.service.impl.MenuServiceImpl: debug
    com.aihub.admin.controller.RouteController: debug
    
    # 初始化服务：debug（用于调试初始化状态，可改为 info 减少日志）
    com.aihub.admin.service.impl.InitializationServiceImpl: debug
    
    # Spring 框架：info（减少框架日志）
    org.springframework: info
    
    # MyBatis SQL 日志：debug（查看 SQL 执行情况）
    com.aihub.admin.mapper.MenuMapper: debug
    
    # MyBatis SQL 日志：warn（减少 SQL 输出，如需查看 SQL 可改为 debug）
    org.apache.ibatis: warn
    
    # JDBC 连接日志：warn（减少数据库连接日志）
    org.springframework.jdbc: warn