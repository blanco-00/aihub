version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: aihub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aihub123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aihub}
      MYSQL_USER: ${MYSQL_USER:-aihub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aihub123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../docs/sql/init/init_v1.0.0.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-aihub123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aihub-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: aihub-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-aihub123456}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aihub-network

  # 后端 API 服务
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: aihub-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      # 数据库配置（使用 docker-compose 服务名）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-aihub}
      DB_USERNAME: ${MYSQL_USER:-aihub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-aihub123456}
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-aihub123456}
      # JWT 配置（生产环境应使用环境变量）
      JWT_SECRET: ${JWT_SECRET:-aihub-secret-key-change-in-production-environment-minimum-32-characters}
      # Spring Profile
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # 挂载日志目录（可选）
      - ../logs/backend:/app/logs
    networks:
      - aihub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: aihub-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    environment:
      # API 地址（使用 docker-compose 服务名）
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    networks:
      - aihub-network

networks:
  aihub-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
