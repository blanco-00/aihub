version: '3.8'

# 开发环境配置（仅启动基础设施，应用本地运行）
services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: aihub-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aihub123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aihub}
      MYSQL_USER: ${MYSQL_USER:-aihub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aihub123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ../docs/sql/init/init_v1.0.0.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-aihub123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: aihub-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-aihub123456}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  default:
    name: aihub-dev-network

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
